server:
  port: 8080
  tomcat:
    max-connections: 20000
    accept-count: 200
    connection-timeout: 10000
    threads:
      max: 400

spring:
  application:
    name: edu-platform

  threads:
    virtual:
      enabled: true

  # 数据库配置
  datasource:
    url: jdbc:mysql://localhost:3306/edu_platform?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 100
      minimum-idle: 20
      connection-timeout: 5000
      idle-timeout: 300000
      max-lifetime: 900000
      leak-detection-threshold: 30000

  # JPA 配置
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  # Redis 配置
  data:
    redis:
      host: localhost
      port: 6379
      password: 
      database: 0
      timeout: 60000
      lettuce:
        pool:
          max-active: 100
          max-idle: 50
          min-idle: 20
          max-wait: 1000ms
    mongodb:
      uri: mongodb://localhost:27017/edu_platform

  # RabbitMQ 配置
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    virtual-host: /
    listener:
      simple:
        acknowledge-mode: auto
        concurrency: 20
        max-concurrency: 50
        prefetch: 100

  # 文件上传配置
  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB
      max-request-size: 100MB

# 日志配置
logging:
  level:
    com.edu.platform: INFO
    org.springframework.security: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{50} - %msg%n"

# AI 服务配置
ai:
  service:
    url: http://localhost:8000
    timeout: 60000
    api-key: ${AI_API_KEY:}

chat:
  context:
    history-window: 40
    ttl-days: 30
  reply:
    timeout-ms: 60000

# JWT 配置
jwt:
  secret: ${JWT_SECRET:edu-platform-secret-key-2024-secure-jwt}  # 32字符
  expiration: 7200000
  refresh-expiration: 604800000

# CORS 配置
cors:
  allowed-origins: http://localhost:3000,http://127.0.0.1:3000
  allowed-methods: GET,POST,PUT,DELETE,OPTIONS
  allowed-headers: "*"
  allow-credentials: true

# Resilience4j 熔断限流
resilience4j:
  circuitbreaker:
    instances:
      aiService:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
  ratelimiter:
    instances:
      chatApi:
        limit-for-period: 500
        limit-refresh-period: 1s
        timeout-duration: 500ms
      authApi:
        limit-for-period: 100
        limit-refresh-period: 1s
        timeout-duration: 500ms
